<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adversarial Battlefield — Babylon.js</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
  #renderCanvas { width: 100%; height: 100%; display: block; outline: none; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 20px 30px; z-index: 10;
  }
  .hud-panel {
    background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 14px 22px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; min-width: 160px;
  }
  .hud-panel h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-bottom: 6px; }
  .hud-panel .value { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
  .hud-center { text-align: center; min-width: 200px; }
  .hud-center .value { font-size: 42px; font-variant-numeric: tabular-nums; }
  .red-text { color: #ff4444; text-shadow: 0 0 20px rgba(255,68,68,0.5); }
  .blue-text { color: #4488ff; text-shadow: 0 0 20px rgba(68,136,255,0.5); }
  .timer-text { color: #ffcc00; text-shadow: 0 0 20px rgba(255,204,0,0.4); }
  .hud-panel .sub { font-size: 13px; opacity: 0.7; margin-top: 2px; }

  /* Bottom bar */
  #bottomBar {
    position: absolute; bottom: 0; left: 0; width: 100%;
    pointer-events: none; display: flex; justify-content: center;
    padding: 20px 30px; z-index: 10;
  }
  #statusText {
    background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 10px 30px; color: rgba(255,255,255,0.7); font-size: 13px;
    letter-spacing: 1px; backdrop-filter: blur(10px);
  }

  /* Winner overlay */
  #winnerOverlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: none; justify-content: center; align-items: center;
    z-index: 100; pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
  }
  #winnerOverlay.show { display: flex; animation: fadeInOverlay 1.5s ease; }
  #winnerBox {
    text-align: center; color: #fff; transform: scale(0.8); opacity: 0;
    animation: popIn 0.8s ease 0.5s forwards;
  }
  #winnerBox h1 { font-size: 64px; font-weight: 900; letter-spacing: 4px; margin-bottom: 10px; }
  #winnerBox p { font-size: 22px; opacity: 0.7; letter-spacing: 2px; }
  @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Loading */
  #loadingScreen {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0a0f; display: flex; flex-direction: column;
    justify-content: center; align-items: center; z-index: 200;
    transition: opacity 1s ease;
  }
  #loadingScreen.hidden { opacity: 0; pointer-events: none; }
  #loadingScreen h1 { color: #fff; font-size: 36px; font-weight: 300; letter-spacing: 6px; margin-bottom: 30px; }
  .loader { width: 60px; height: 60px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #ffcc00; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingStatus { color: rgba(255,255,255,0.4); margin-top: 20px; font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>

<div id="hud">
  <div class="hud-panel">
    <h3>Red Attackers</h3>
    <div class="value red-text"><span id="redCount">8</span> / 8</div>
    <div class="sub">Kills: <span id="redKills">0</span></div>
  </div>
  <div class="hud-panel hud-center">
    <h3>Time Remaining</h3>
    <div class="value timer-text" id="timer">2:00</div>
    <div class="sub" id="phaseText">Battle Phase</div>
  </div>
  <div class="hud-panel" style="text-align:right;">
    <h3>Blue Defenders</h3>
    <div class="value blue-text"><span id="blueCount">8</span> / 8</div>
    <div class="sub">Kills: <span id="blueKills">0</span></div>
  </div>
</div>

<div id="bottomBar">
  <div id="statusText">INITIALIZING BATTLEFIELD...</div>
</div>

<div id="winnerOverlay">
  <div id="winnerBox">
    <h1 id="winnerTitle">VICTORY</h1>
    <p id="winnerSub">Red team conquered the base</p>
  </div>
</div>

<div id="loadingScreen">
  <h1>BATTLEFIELD</h1>
  <div class="loader"></div>
  <div id="loadingStatus">Loading engine...</div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
<script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>

<script>
(async function() {
  // ───────────────────────── Utility ─────────────────────────
  const $ = id => document.getElementById(id);
  const lerp = (a,b,t) => a + (b - a) * t;
  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
  const rng = (lo,hi) => Math.random() * (hi - lo) + lo;
  const dist2D = (a,b) => Math.sqrt((a.x-b.x)**2 + (a.z-b.z)**2);

  // ───────────────────────── Engine init ─────────────────────────
  $('loadingStatus').textContent = 'Initializing physics...';
  const canvas = $('renderCanvas');
  const engine = new BABYLON.Engine(canvas, true, { stencil: true, preserveDrawingBuffer: true });
  engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

  let havokInstance;
  try {
    havokInstance = await HavokPhysics();
  } catch(e) {
    console.warn('Havok failed to load, running without physics', e);
  }

  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.02, 0.02, 0.05, 1);
  scene.ambientColor = new BABYLON.Color3(0.05, 0.05, 0.08);
  scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
  scene.fogDensity = 0.008;
  scene.fogColor = new BABYLON.Color3(0.15, 0.12, 0.18);
  scene.collisionsEnabled = true;

  // Physics
  if (havokInstance) {
    const havokPlugin = new BABYLON.HavokPlugin(true, havokInstance);
    scene.enablePhysics(new BABYLON.Vector3(0, -9.81, 0), havokPlugin);
  }

  $('loadingStatus').textContent = 'Building world...';

  // ───────────────────────── Camera ─────────────────────────
  const camera = new BABYLON.ArcRotateCamera('cam', -Math.PI / 2, Math.PI / 3.2, 75, new BABYLON.Vector3(0, 2, 0), scene);
  camera.lowerRadiusLimit = 30;
  camera.upperRadiusLimit = 120;
  camera.lowerBetaLimit = 0.3;
  camera.upperBetaLimit = Math.PI / 2.3;
  camera.attachControl(canvas, true);
  camera.wheelPrecision = 20;
  camera.panningSensibility = 200;

  // Cinematic auto-orbit
  let autoOrbit = true;
  let orbitSpeed = 0.0004;
  canvas.addEventListener('pointerdown', () => { autoOrbit = false; });

  // ───────────────────────── Lights ─────────────────────────
  // Sun
  const sun = new BABYLON.DirectionalLight('sun', new BABYLON.Vector3(-0.5, -1, 0.3).normalize(), scene);
  sun.intensity = 2.5;
  sun.diffuse = new BABYLON.Color3(1, 0.92, 0.8);
  sun.specular = new BABYLON.Color3(1, 0.95, 0.85);
  sun.position = new BABYLON.Vector3(30, 60, -20);

  // Shadows
  const shadowGen = new BABYLON.ShadowGenerator(2048, sun);
  shadowGen.useBlurExponentialShadowMap = true;
  shadowGen.blurKernel = 32;
  shadowGen.depthScale = 50;
  shadowGen.setDarkness(0.3);

  // Hemisphere (ambient fill)
  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
  hemi.intensity = 0.4;
  hemi.diffuse = new BABYLON.Color3(0.6, 0.65, 0.8);
  hemi.groundColor = new BABYLON.Color3(0.15, 0.1, 0.12);

  // ───────────────────────── Skybox ─────────────────────────
  // Procedural gradient sky using a large sphere
  const skyMat = new BABYLON.ShaderMaterial('skyShader', scene, {
    vertexSource: `
      precision highp float;
      attribute vec3 position;
      uniform mat4 worldViewProjection;
      varying vec3 vPos;
      void main() {
        vPos = position;
        gl_Position = worldViewProjection * vec4(position, 1.0);
      }
    `,
    fragmentSource: `
      precision highp float;
      varying vec3 vPos;
      void main() {
        float h = normalize(vPos).y;
        vec3 bottom = vec3(0.15, 0.08, 0.18);
        vec3 mid = vec3(0.25, 0.15, 0.35);
        vec3 top = vec3(0.05, 0.05, 0.15);
        vec3 col = mix(bottom, mid, smoothstep(-0.1, 0.3, h));
        col = mix(col, top, smoothstep(0.3, 0.9, h));
        // Sun glow
        vec3 sunDir = normalize(vec3(-0.5, 0.3, 0.3));
        float sunDot = max(dot(normalize(vPos), sunDir), 0.0);
        col += vec3(1.0, 0.7, 0.3) * pow(sunDot, 32.0) * 2.0;
        col += vec3(1.0, 0.5, 0.2) * pow(sunDot, 4.0) * 0.3;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  }, {
    attributes: ['position'],
    uniforms: ['worldViewProjection']
  });
  skyMat.backFaceCulling = false;
  const skySphere = BABYLON.MeshBuilder.CreateSphere('sky', { diameter: 500, segments: 32 }, scene);
  skySphere.material = skyMat;
  skySphere.infiniteDistance = true;
  skySphere.isPickable = false;

  // ───────────────────────── Terrain ─────────────────────────
  const TERRAIN_SIZE = 120;
  const TERRAIN_SUB = 100;
  const ground = BABYLON.MeshBuilder.CreateGround('ground', {
    width: TERRAIN_SIZE, height: TERRAIN_SIZE,
    subdivisions: TERRAIN_SUB, updatable: true
  }, scene);

  // Procedural heightmap
  const positions = ground.getVerticesData(BABYLON.VertexBuffer.PositionKind);
  const normals = ground.getVerticesData(BABYLON.VertexBuffer.NormalKind);

  function fbm(x, z) {
    let val = 0, amp = 1, freq = 0.03, totalAmp = 0;
    for (let i = 0; i < 5; i++) {
      val += amp * Math.sin(x * freq + i * 1.7) * Math.cos(z * freq + i * 2.3);
      val += amp * 0.5 * Math.sin(x * freq * 1.5 + z * freq * 0.7 + i);
      totalAmp += amp;
      amp *= 0.5;
      freq *= 2.0;
    }
    return (val / totalAmp) * 5;
  }

  const heightData = [];
  const stride = (TERRAIN_SUB + 1);
  for (let i = 0; i < positions.length; i += 3) {
    const x = positions[i], z = positions[i + 2];
    // Flatten center area for base
    const distFromCenter = Math.sqrt(x * x + z * z);
    const flattenFactor = clamp(1.0 - Math.exp(-distFromCenter * distFromCenter / 400), 0, 1);
    const h = fbm(x, z) * flattenFactor;
    positions[i + 1] = h;
    heightData.push(h);
  }

  ground.updateVerticesData(BABYLON.VertexBuffer.PositionKind, positions);
  BABYLON.VertexData.ComputeNormals(positions, ground.getIndices(), normals);
  ground.updateVerticesData(BABYLON.VertexBuffer.NormalKind, normals);
  ground.createNormals(true);

  function getTerrainHeight(x, z) {
    const u = (x / TERRAIN_SIZE + 0.5);
    const v = (z / TERRAIN_SIZE + 0.5);
    const col = clamp(Math.floor(u * TERRAIN_SUB), 0, TERRAIN_SUB - 1);
    const row = clamp(Math.floor(v * TERRAIN_SUB), 0, TERRAIN_SUB - 1);
    const idx = row * stride + col;
    return heightData[idx] || 0;
  }

  // Ground PBR material
  const groundMat = new BABYLON.PBRMaterial('groundMat', scene);
  groundMat.albedoColor = new BABYLON.Color3(0.12, 0.14, 0.1);
  groundMat.metallic = 0.1;
  groundMat.roughness = 0.85;
  groundMat.emissiveColor = new BABYLON.Color3(0.01, 0.01, 0.005);
  groundMat.ambientColor = new BABYLON.Color3(0.05, 0.06, 0.04);
  groundMat.environmentIntensity = 0.3;
  ground.material = groundMat;
  ground.receiveShadows = true;

  if (havokInstance) {
    const groundAggregate = new BABYLON.PhysicsAggregate(ground, BABYLON.PhysicsShapeType.MESH, { mass: 0, friction: 0.8, restitution: 0.2 }, scene);
  }

  // ───────────────────────── Grid lines on terrain ─────────────────────────
  const gridLines = [];
  const GRID_SPACING = 10;
  for (let i = -TERRAIN_SIZE/2; i <= TERRAIN_SIZE/2; i += GRID_SPACING) {
    const pts1 = [], pts2 = [];
    for (let j = -TERRAIN_SIZE/2; j <= TERRAIN_SIZE/2; j += 2) {
      const h1 = getTerrainHeight(i, j) + 0.05;
      const h2 = getTerrainHeight(j, i) + 0.05;
      pts1.push(new BABYLON.Vector3(i, h1, j));
      pts2.push(new BABYLON.Vector3(j, h2, i));
    }
    gridLines.push(pts1);
    gridLines.push(pts2);
  }
  const gridMesh = BABYLON.MeshBuilder.CreateLineSystem('grid', { lines: gridLines }, scene);
  gridMesh.color = new BABYLON.Color3(0.08, 0.1, 0.06);
  gridMesh.alpha = 0.25;

  // ───────────────────────── Blue Base (Crystal Fortress) ─────────────────────────
  const BASE_POS = new BABYLON.Vector3(0, 0, 0);

  // Platform
  const basePlatform = BABYLON.MeshBuilder.CreateCylinder('platform', { diameter: 16, height: 1.0, tessellation: 8 }, scene);
  basePlatform.position = new BABYLON.Vector3(0, 0.3, 0);
  const platMat = new BABYLON.PBRMaterial('platMat', scene);
  platMat.albedoColor = new BABYLON.Color3(0.08, 0.12, 0.2);
  platMat.metallic = 0.9;
  platMat.roughness = 0.3;
  platMat.emissiveColor = new BABYLON.Color3(0.02, 0.04, 0.1);
  basePlatform.material = platMat;
  basePlatform.receiveShadows = true;
  shadowGen.addShadowCaster(basePlatform);

  // Central crystal
  const crystal = BABYLON.MeshBuilder.CreatePolyhedron('crystal', { type: 1, size: 3 }, scene);
  crystal.position = new BABYLON.Vector3(0, 5, 0);
  crystal.scaling = new BABYLON.Vector3(1, 1.8, 1);
  const crystalMat = new BABYLON.PBRMaterial('crystalMat', scene);
  crystalMat.albedoColor = new BABYLON.Color3(0.1, 0.3, 0.9);
  crystalMat.metallic = 0.2;
  crystalMat.roughness = 0.1;
  crystalMat.emissiveColor = new BABYLON.Color3(0.1, 0.3, 1.0);
  crystalMat.alpha = 0.85;
  crystalMat.subSurface.isTranslucencyEnabled = true;
  crystalMat.subSurface.translucencyIntensity = 0.8;
  crystal.material = crystalMat;
  shadowGen.addShadowCaster(crystal);

  // Crystal glow light
  const crystalLight = new BABYLON.PointLight('crystalLight', new BABYLON.Vector3(0, 6, 0), scene);
  crystalLight.diffuse = new BABYLON.Color3(0.3, 0.5, 1.0);
  crystalLight.intensity = 8;
  crystalLight.range = 25;

  // Outer pillars
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2;
    const px = Math.cos(angle) * 7;
    const pz = Math.sin(angle) * 7;
    const pillar = BABYLON.MeshBuilder.CreateCylinder('pillar' + i, { diameter: 0.6, height: 6, tessellation: 6 }, scene);
    pillar.position = new BABYLON.Vector3(px, 3, pz);
    const pMat = new BABYLON.PBRMaterial('pMat' + i, scene);
    pMat.albedoColor = new BABYLON.Color3(0.15, 0.15, 0.25);
    pMat.metallic = 0.95;
    pMat.roughness = 0.2;
    pMat.emissiveColor = new BABYLON.Color3(0.02, 0.05, 0.15);
    pillar.material = pMat;
    shadowGen.addShadowCaster(pillar);
    pillar.receiveShadows = true;

    // Pillar crystal top
    const topGem = BABYLON.MeshBuilder.CreatePolyhedron('topGem' + i, { type: 2, size: 0.5 }, scene);
    topGem.position = new BABYLON.Vector3(px, 6.5, pz);
    topGem.material = crystalMat.clone('topGemMat' + i);
    topGem.material.emissiveColor = new BABYLON.Color3(0.15, 0.3, 0.9);
    shadowGen.addShadowCaster(topGem);
  }

  // Shield particle effect around base
  const shieldPS = new BABYLON.ParticleSystem('shield', 300, scene);
  shieldPS.createSphereEmitter(8, 0);
  shieldPS.emitter = new BABYLON.Vector3(0, 3, 0);
  shieldPS.minLifeTime = 1.5;
  shieldPS.maxLifeTime = 3.0;
  shieldPS.emitRate = 80;
  shieldPS.minSize = 0.05;
  shieldPS.maxSize = 0.2;
  shieldPS.color1 = new BABYLON.Color4(0.2, 0.5, 1.0, 0.4);
  shieldPS.color2 = new BABYLON.Color4(0.4, 0.6, 1.0, 0.2);
  shieldPS.colorDead = new BABYLON.Color4(0.1, 0.2, 0.5, 0);
  shieldPS.minEmitPower = 0.01;
  shieldPS.maxEmitPower = 0.05;
  shieldPS.gravity = new BABYLON.Vector3(0, 0.2, 0);
  shieldPS.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
  shieldPS.start();

  // ───────────────────────── Ambient Dust / Fireflies ─────────────────────────
  const dustPS = new BABYLON.ParticleSystem('dust', 200, scene);
  dustPS.createBoxEmitter(
    new BABYLON.Vector3(0, 0.5, 0), new BABYLON.Vector3(0, 0.3, 0),
    new BABYLON.Vector3(-50, 0, -50), new BABYLON.Vector3(50, 0, 50)
  );
  dustPS.emitter = new BABYLON.Vector3(0, 1, 0);
  dustPS.minLifeTime = 4; dustPS.maxLifeTime = 8;
  dustPS.emitRate = 30;
  dustPS.minSize = 0.03; dustPS.maxSize = 0.12;
  dustPS.color1 = new BABYLON.Color4(1, 0.95, 0.7, 0.25);
  dustPS.color2 = new BABYLON.Color4(0.6, 0.8, 1.0, 0.15);
  dustPS.colorDead = new BABYLON.Color4(0.5, 0.5, 0.5, 0);
  dustPS.minEmitPower = 0.05; dustPS.maxEmitPower = 0.15;
  dustPS.gravity = new BABYLON.Vector3(0.05, 0.02, 0.02);
  dustPS.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
  dustPS.start();

  // Firefly-like particles
  const fireflyPS = new BABYLON.ParticleSystem('firefly', 50, scene);
  fireflyPS.createBoxEmitter(
    new BABYLON.Vector3(0, 0.3, 0), new BABYLON.Vector3(0, 0.1, 0),
    new BABYLON.Vector3(-40, 0, -40), new BABYLON.Vector3(40, 0, 40)
  );
  fireflyPS.emitter = new BABYLON.Vector3(0, 3, 0);
  fireflyPS.minLifeTime = 3; fireflyPS.maxLifeTime = 6;
  fireflyPS.emitRate = 8;
  fireflyPS.minSize = 0.1; fireflyPS.maxSize = 0.3;
  fireflyPS.color1 = new BABYLON.Color4(0.8, 1, 0.3, 0.6);
  fireflyPS.color2 = new BABYLON.Color4(0.3, 0.9, 0.8, 0.4);
  fireflyPS.colorDead = new BABYLON.Color4(0, 0, 0, 0);
  fireflyPS.minEmitPower = 0.02; fireflyPS.maxEmitPower = 0.08;
  fireflyPS.gravity = new BABYLON.Vector3(0, 0.05, 0);
  fireflyPS.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
  fireflyPS.start();

  // ───────────────────────── Post Processing ─────────────────────────
  const pipeline = new BABYLON.DefaultRenderingPipeline('pipeline', true, scene, [camera]);
  pipeline.bloomEnabled = true;
  pipeline.bloomThreshold = 0.3;
  pipeline.bloomWeight = 0.6;
  pipeline.bloomKernel = 64;
  pipeline.bloomScale = 0.5;
  pipeline.chromaticAberrationEnabled = true;
  pipeline.chromaticAberration.aberrationAmount = 15;
  pipeline.chromaticAberration.radialIntensity = 0.8;
  pipeline.fxaaEnabled = true;
  pipeline.imageProcessingEnabled = true;
  pipeline.imageProcessing.toneMappingEnabled = true;
  pipeline.imageProcessing.toneMappingType = BABYLON.ImageProcessingConfiguration.TONEMAPPING_ACES;
  pipeline.imageProcessing.exposure = 1.1;
  pipeline.imageProcessing.contrast = 1.15;
  pipeline.imageProcessing.vignetteEnabled = true;
  pipeline.imageProcessing.vignetteWeight = 3;
  pipeline.imageProcessing.vignetteStretch = 0.5;
  pipeline.imageProcessing.vignetteColor = new BABYLON.Color4(0, 0, 0, 1);
  pipeline.depthOfFieldEnabled = false;
  pipeline.grainEnabled = true;
  pipeline.grain.intensity = 8;
  pipeline.grain.animated = true;

  // ───────────────────────── Unit class ─────────────────────────
  const units = [];
  const projectiles = [];
  let redKills = 0, blueKills = 0;

  class Unit {
    constructor(team, index) {
      this.team = team;
      this.alive = true;
      this.hp = 100;
      this.maxHp = 100;
      this.speed = team === 'red' ? 6 : 5;
      this.damage = 18;
      this.fireRate = 1.8;
      this.lastFire = 0;
      this.target = null;
      this.id = team + index;

      // Spawn positions
      const spawnRadius = team === 'red' ? 45 : 15;
      const angleOffset = team === 'red' ? Math.PI : 0;
      const angle = angleOffset + (index / 8) * Math.PI * 2 * 0.6 - Math.PI * 0.3;
      const sx = Math.cos(angle) * spawnRadius + rng(-3, 3);
      const sz = Math.sin(angle) * spawnRadius + rng(-3, 3);
      const sy = getTerrainHeight(sx, sz) + 1.2;

      // Body — capsule-like (sphere + cylinder)
      this.body = BABYLON.MeshBuilder.CreateSphere(this.id + '_body', { diameter: 1.8, segments: 16 }, scene);
      this.body.position = new BABYLON.Vector3(sx, sy, sz);

      // PBR material
      const mat = new BABYLON.PBRMaterial(this.id + '_mat', scene);
      const isRed = team === 'red';
      mat.albedoColor = isRed ? new BABYLON.Color3(0.6, 0.08, 0.05) : new BABYLON.Color3(0.05, 0.12, 0.6);
      mat.metallic = 0.85;
      mat.roughness = 0.15;
      mat.emissiveColor = isRed ? new BABYLON.Color3(0.8, 0.15, 0.05) : new BABYLON.Color3(0.05, 0.2, 0.9);
      this.body.material = mat;
      this.mat = mat;

      shadowGen.addShadowCaster(this.body);
      this.body.receiveShadows = true;

      // Head orb
      this.head = BABYLON.MeshBuilder.CreateSphere(this.id + '_head', { diameter: 0.8, segments: 12 }, scene);
      this.head.parent = this.body;
      this.head.position.y = 1.1;
      const headMat = new BABYLON.PBRMaterial(this.id + '_headMat', scene);
      headMat.albedoColor = isRed ? new BABYLON.Color3(1, 0.3, 0.1) : new BABYLON.Color3(0.2, 0.5, 1.0);
      headMat.metallic = 0.3;
      headMat.roughness = 0.1;
      headMat.emissiveColor = isRed ? new BABYLON.Color3(1, 0.3, 0.1) : new BABYLON.Color3(0.3, 0.5, 1.0);
      this.head.material = headMat;

      // Point light
      this.light = new BABYLON.PointLight(this.id + '_light', this.body.position.clone(), scene);
      this.light.diffuse = isRed ? new BABYLON.Color3(1, 0.3, 0.1) : new BABYLON.Color3(0.3, 0.5, 1.0);
      this.light.intensity = 3;
      this.light.range = 10;

      // Trail particles
      this.trail = new BABYLON.ParticleSystem(this.id + '_trail', 60, scene);
      this.trail.emitter = this.body;
      this.trail.createPointEmitter(new BABYLON.Vector3(0, -0.3, 0), new BABYLON.Vector3(0, -0.5, 0));
      this.trail.minLifeTime = 0.3; this.trail.maxLifeTime = 0.8;
      this.trail.emitRate = 30;
      this.trail.minSize = 0.1; this.trail.maxSize = 0.4;
      this.trail.color1 = isRed ? new BABYLON.Color4(1, 0.3, 0.05, 0.6) : new BABYLON.Color4(0.1, 0.4, 1, 0.6);
      this.trail.color2 = isRed ? new BABYLON.Color4(1, 0.6, 0.1, 0.3) : new BABYLON.Color4(0.3, 0.6, 1, 0.3);
      this.trail.colorDead = new BABYLON.Color4(0, 0, 0, 0);
      this.trail.minEmitPower = 0.1; this.trail.maxEmitPower = 0.3;
      this.trail.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
      this.trail.start();

      // HP bar
      this.hpPlane = BABYLON.MeshBuilder.CreatePlane(this.id + '_hp', { width: 2, height: 0.2 }, scene);
      this.hpPlane.parent = this.body;
      this.hpPlane.position.y = 1.8;
      this.hpPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
      const hpMat = new BABYLON.StandardMaterial(this.id + '_hpMat', scene);
      hpMat.emissiveColor = isRed ? new BABYLON.Color3(1, 0.2, 0.1) : new BABYLON.Color3(0.1, 0.4, 1);
      hpMat.disableLighting = true;
      hpMat.alpha = 0.8;
      this.hpPlane.material = hpMat;

      // Physics (if available)
      if (havokInstance) {
        this.aggregate = new BABYLON.PhysicsAggregate(this.body, BABYLON.PhysicsShapeType.SPHERE, {
          mass: 5, friction: 0.5, restitution: 0.3
        }, scene);
      }

      // Movement vars
      this.velocity = new BABYLON.Vector3(0, 0, 0);
      this.patrolTarget = null;
      this.patrolTimer = 0;
    }

    update(dt, time, allUnits) {
      if (!this.alive) return;

      const pos = this.body.position;

      // Keep on terrain
      const th = getTerrainHeight(pos.x, pos.z) + 1.2;
      if (!havokInstance) {
        pos.y = lerp(pos.y, th, 0.1);
      } else {
        if (pos.y < th) pos.y = th;
      }

      // Clamp to terrain bounds
      pos.x = clamp(pos.x, -55, 55);
      pos.z = clamp(pos.z, -55, 55);

      // Light follow
      this.light.position.copyFrom(pos);
      this.light.position.y += 1;

      // Find target
      this.target = null;
      let minDist = Infinity;
      for (const u of allUnits) {
        if (!u.alive || u.team === this.team) continue;
        const d = dist2D(pos, u.body.position);
        if (d < minDist) { minDist = d; this.target = u; }
      }

      // AI
      if (this.team === 'red') {
        this.aiAttacker(dt, time, minDist);
      } else {
        this.aiDefender(dt, time, minDist);
      }

      // HP bar scale
      const hpFrac = this.hp / this.maxHp;
      this.hpPlane.scaling.x = Math.max(0.01, hpFrac);

      // Pulsing glow
      const pulse = 0.7 + 0.3 * Math.sin(time * 3 + (this.team === 'red' ? 0 : Math.PI));
      this.light.intensity = 2 + pulse * 2;
    }

    aiAttacker(dt, time, targetDist) {
      const pos = this.body.position;
      // Move toward base, engage if enemies near
      let goalX = BASE_POS.x, goalZ = BASE_POS.z;

      if (this.target && targetDist < 25) {
        goalX = this.target.body.position.x;
        goalZ = this.target.body.position.z;

        if (targetDist < 20 && time - this.lastFire > this.fireRate) {
          this.shoot(this.target);
          this.lastFire = time;
        }
      }

      // Steer
      const dx = goalX - pos.x, dz = goalZ - pos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > 1.5) {
        const vx = (dx / dist) * this.speed * dt;
        const vz = (dz / dist) * this.speed * dt;
        if (havokInstance && this.aggregate) {
          this.aggregate.body.setLinearVelocity(new BABYLON.Vector3(vx / dt * 0.3, 0, vz / dt * 0.3));
        } else {
          pos.x += vx;
          pos.z += vz;
        }
      }

      // Rotate body toward goal
      const angle = Math.atan2(dx, dz);
      this.body.rotation.y = lerp(this.body.rotation.y, angle, 0.1);
    }

    aiDefender(dt, time, targetDist) {
      const pos = this.body.position;

      // Patrol around base
      if (!this.patrolTarget || this.patrolTimer <= 0) {
        const angle = rng(0, Math.PI * 2);
        const r = rng(8, 22);
        this.patrolTarget = new BABYLON.Vector3(Math.cos(angle) * r, 0, Math.sin(angle) * r);
        this.patrolTimer = rng(3, 6);
      }
      this.patrolTimer -= dt;

      let goalX = this.patrolTarget.x, goalZ = this.patrolTarget.z;

      // Intercept nearby enemies
      if (this.target && targetDist < 28) {
        goalX = this.target.body.position.x;
        goalZ = this.target.body.position.z;

        if (targetDist < 22 && time - this.lastFire > this.fireRate) {
          this.shoot(this.target);
          this.lastFire = time;
        }
      }

      const dx = goalX - pos.x, dz = goalZ - pos.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      if (dist > 1) {
        const vx = (dx / dist) * this.speed * dt;
        const vz = (dz / dist) * this.speed * dt;
        if (havokInstance && this.aggregate) {
          this.aggregate.body.setLinearVelocity(new BABYLON.Vector3(vx / dt * 0.3, 0, vz / dt * 0.3));
        } else {
          pos.x += vx;
          pos.z += vz;
        }
      }

      const angle = Math.atan2(dx, dz);
      this.body.rotation.y = lerp(this.body.rotation.y, angle, 0.1);
    }

    shoot(target) {
      const startPos = this.body.position.clone();
      startPos.y += 1;
      spawnProjectile(startPos, target.body.position.clone(), this.team, this.damage, target);
    }

    takeDamage(amount, fromTeam) {
      if (!this.alive) return;
      this.hp -= amount;

      // Flash effect
      const origEmissive = this.mat.emissiveColor.clone();
      this.mat.emissiveColor = new BABYLON.Color3(1, 1, 1);
      setTimeout(() => { if (this.mat) this.mat.emissiveColor = origEmissive; }, 80);

      // Knockback
      if (havokInstance && this.aggregate) {
        const impulseDir = this.body.position.subtract(BASE_POS).normalize();
        this.aggregate.body.applyImpulse(impulseDir.scale(5), this.body.position);
      }

      if (this.hp <= 0) {
        this.die(fromTeam);
      }
    }

    die(killerTeam) {
      this.alive = false;
      if (killerTeam === 'red') redKills++;
      else blueKills++;

      spawnExplosion(this.body.position.clone(), this.team);

      // Cleanup
      this.trail.stop();
      setTimeout(() => {
        this.trail.dispose();
        this.body.dispose();
        this.head.dispose();
        this.hpPlane.dispose();
        this.light.dispose();
      }, 200);
    }
  }

  // ───────────────────────── Projectiles ─────────────────────────
  function spawnProjectile(start, targetPos, team, damage, targetUnit) {
    const orb = BABYLON.MeshBuilder.CreateSphere('proj', { diameter: 0.4, segments: 8 }, scene);
    orb.position = start.clone();

    const mat = new BABYLON.PBRMaterial('projMat', scene);
    mat.albedoColor = team === 'red' ? new BABYLON.Color3(1, 0.3, 0.05) : new BABYLON.Color3(0.1, 0.4, 1);
    mat.metallic = 0.1;
    mat.roughness = 0.1;
    mat.emissiveColor = team === 'red' ? new BABYLON.Color3(2, 0.6, 0.1) : new BABYLON.Color3(0.2, 0.6, 2.0);
    orb.material = mat;

    // Light on projectile
    const pLight = new BABYLON.PointLight('pLight', start.clone(), scene);
    pLight.diffuse = team === 'red' ? new BABYLON.Color3(1, 0.4, 0.1) : new BABYLON.Color3(0.2, 0.5, 1);
    pLight.intensity = 4;
    pLight.range = 8;

    // Trail
    const pTrail = new BABYLON.ParticleSystem('pTrail', 30, scene);
    pTrail.emitter = orb;
    pTrail.createPointEmitter(new BABYLON.Vector3(0, 0, 0), new BABYLON.Vector3(0, 0, 0));
    pTrail.minLifeTime = 0.1; pTrail.maxLifeTime = 0.3;
    pTrail.emitRate = 40;
    pTrail.minSize = 0.1; pTrail.maxSize = 0.25;
    pTrail.color1 = team === 'red' ? new BABYLON.Color4(1, 0.5, 0.1, 0.8) : new BABYLON.Color4(0.3, 0.6, 1, 0.8);
    pTrail.color2 = team === 'red' ? new BABYLON.Color4(1, 0.2, 0.05, 0.4) : new BABYLON.Color4(0.1, 0.3, 1, 0.4);
    pTrail.colorDead = new BABYLON.Color4(0, 0, 0, 0);
    pTrail.minEmitPower = 0; pTrail.maxEmitPower = 0.1;
    pTrail.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
    pTrail.start();

    // Arc trajectory
    const direction = targetPos.subtract(start);
    const dist = direction.length();
    const flatDir = new BABYLON.Vector3(direction.x, 0, direction.z).normalize();
    const flightTime = dist / 25;
    const arcHeight = Math.max(2, dist * 0.15);

    projectiles.push({
      mesh: orb, light: pLight, trail: pTrail,
      start: start.clone(), target: targetPos.clone(),
      team, damage, targetUnit,
      elapsed: 0, flightTime, arcHeight,
      alive: true
    });
  }

  function updateProjectiles(dt) {
    for (let i = projectiles.length - 1; i >= 0; i--) {
      const p = projectiles[i];
      if (!p.alive) continue;

      p.elapsed += dt;
      const t = clamp(p.elapsed / p.flightTime, 0, 1);

      // Parabolic arc
      const pos = BABYLON.Vector3.Lerp(p.start, p.target, t);
      pos.y += p.arcHeight * 4 * t * (1 - t);
      p.mesh.position.copyFrom(pos);
      p.light.position.copyFrom(pos);

      if (t >= 1) {
        // Hit
        if (p.targetUnit && p.targetUnit.alive) {
          p.targetUnit.takeDamage(p.damage, p.team);
          spawnHitSpark(pos, p.team);
        }

        p.alive = false;
        p.trail.stop();
        setTimeout(() => {
          p.trail.dispose();
          p.mesh.dispose();
          p.light.dispose();
        }, 300);
        projectiles.splice(i, 1);
      }
    }
  }

  // ───────────────────────── Explosions ─────────────────────────
  function spawnExplosion(pos, team) {
    const isRed = team === 'red';

    // Fire burst
    const fire = new BABYLON.ParticleSystem('explosion', 150, scene);
    fire.emitter = pos.clone();
    fire.createSphereEmitter(1.5);
    fire.minLifeTime = 0.4; fire.maxLifeTime = 1.2;
    fire.emitRate = 500;
    fire.manualEmitCount = 120;
    fire.minSize = 0.3; fire.maxSize = 1.2;
    fire.color1 = isRed ? new BABYLON.Color4(1, 0.4, 0.05, 1) : new BABYLON.Color4(0.2, 0.5, 1, 1);
    fire.color2 = new BABYLON.Color4(1, 0.8, 0.2, 0.8);
    fire.colorDead = new BABYLON.Color4(0.3, 0.1, 0, 0);
    fire.minEmitPower = 3; fire.maxEmitPower = 8;
    fire.gravity = new BABYLON.Vector3(0, -3, 0);
    fire.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
    fire.targetStopDuration = 0.05;
    fire.disposeOnStop = true;
    fire.start();

    // Smoke
    const smoke = new BABYLON.ParticleSystem('smoke', 80, scene);
    smoke.emitter = pos.clone();
    smoke.createSphereEmitter(2);
    smoke.minLifeTime = 1; smoke.maxLifeTime = 3;
    smoke.emitRate = 300;
    smoke.manualEmitCount = 60;
    smoke.minSize = 0.5; smoke.maxSize = 2.5;
    smoke.color1 = new BABYLON.Color4(0.3, 0.3, 0.3, 0.6);
    smoke.color2 = new BABYLON.Color4(0.15, 0.15, 0.15, 0.3);
    smoke.colorDead = new BABYLON.Color4(0.05, 0.05, 0.05, 0);
    smoke.minEmitPower = 1; smoke.maxEmitPower = 4;
    smoke.gravity = new BABYLON.Vector3(0, 2, 0);
    smoke.blendMode = BABYLON.ParticleSystem.BLENDMODE_STANDARD;
    smoke.targetStopDuration = 0.1;
    smoke.disposeOnStop = true;
    smoke.start();

    // Sparks
    const sparks = new BABYLON.ParticleSystem('sparks', 60, scene);
    sparks.emitter = pos.clone();
    sparks.createSphereEmitter(0.5);
    sparks.minLifeTime = 0.3; sparks.maxLifeTime = 1;
    sparks.emitRate = 400;
    sparks.manualEmitCount = 50;
    sparks.minSize = 0.05; sparks.maxSize = 0.15;
    sparks.color1 = new BABYLON.Color4(1, 0.9, 0.3, 1);
    sparks.color2 = new BABYLON.Color4(1, 0.5, 0.1, 1);
    sparks.colorDead = new BABYLON.Color4(0.5, 0.1, 0, 0);
    sparks.minEmitPower = 5; sparks.maxEmitPower = 15;
    sparks.gravity = new BABYLON.Vector3(0, -8, 0);
    sparks.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
    sparks.targetStopDuration = 0.05;
    sparks.disposeOnStop = true;
    sparks.start();

    // Flash light
    const flashLight = new BABYLON.PointLight('flash', pos.clone(), scene);
    flashLight.diffuse = isRed ? new BABYLON.Color3(1, 0.4, 0.1) : new BABYLON.Color3(0.3, 0.5, 1);
    flashLight.intensity = 30;
    flashLight.range = 20;
    let flashTime = 0;
    const fadeFlash = scene.onBeforeRenderObservable.add(() => {
      flashTime += scene.getEngine().getDeltaTime() / 1000;
      flashLight.intensity = Math.max(0, 30 * (1 - flashTime / 0.5));
      if (flashTime > 0.5) {
        flashLight.dispose();
        scene.onBeforeRenderObservable.remove(fadeFlash);
      }
    });
  }

  function spawnHitSpark(pos, team) {
    const spark = new BABYLON.ParticleSystem('hitSpark', 20, scene);
    spark.emitter = pos.clone();
    spark.createSphereEmitter(0.3);
    spark.minLifeTime = 0.1; spark.maxLifeTime = 0.3;
    spark.emitRate = 200;
    spark.manualEmitCount = 15;
    spark.minSize = 0.05; spark.maxSize = 0.2;
    spark.color1 = team === 'red' ? new BABYLON.Color4(1, 0.5, 0.1, 1) : new BABYLON.Color4(0.3, 0.6, 1, 1);
    spark.color2 = new BABYLON.Color4(1, 1, 0.5, 0.8);
    spark.colorDead = new BABYLON.Color4(0, 0, 0, 0);
    spark.minEmitPower = 2; spark.maxEmitPower = 5;
    spark.gravity = new BABYLON.Vector3(0, -5, 0);
    spark.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
    spark.targetStopDuration = 0.02;
    spark.disposeOnStop = true;
    spark.start();
  }

  // ───────────────────────── Spawn Units ─────────────────────────
  $('loadingStatus').textContent = 'Deploying forces...';

  for (let i = 0; i < 8; i++) {
    units.push(new Unit('red', i));
    units.push(new Unit('blue', i));
  }

  // ───────────────────────── Decorations — Rocks & Trees ─────────────────────────
  for (let i = 0; i < 30; i++) {
    const rx = rng(-50, 50), rz = rng(-50, 50);
    if (Math.sqrt(rx*rx + rz*rz) < 12) continue; // Keep clear of base
    const ry = getTerrainHeight(rx, rz);
    const rock = BABYLON.MeshBuilder.CreatePolyhedron('rock' + i, {
      type: Math.floor(rng(0, 3)), size: rng(0.3, 1.2)
    }, scene);
    rock.position = new BABYLON.Vector3(rx, ry + 0.3, rz);
    rock.rotation = new BABYLON.Vector3(rng(0, 0.3), rng(0, Math.PI * 2), rng(0, 0.3));
    const rockMat = new BABYLON.PBRMaterial('rockMat' + i, scene);
    rockMat.albedoColor = new BABYLON.Color3(rng(0.08, 0.15), rng(0.08, 0.12), rng(0.06, 0.1));
    rockMat.metallic = rng(0.2, 0.5);
    rockMat.roughness = rng(0.6, 0.95);
    rock.material = rockMat;
    rock.receiveShadows = true;
    shadowGen.addShadowCaster(rock);
  }

  // Glowing mushrooms / vegetation markers
  for (let i = 0; i < 15; i++) {
    const mx = rng(-45, 45), mz = rng(-45, 45);
    if (Math.sqrt(mx*mx + mz*mz) < 10) continue;
    const my = getTerrainHeight(mx, mz);
    const mush = BABYLON.MeshBuilder.CreateCapsule('mush' + i, { height: rng(0.8, 2), radius: rng(0.15, 0.35) }, scene);
    mush.position = new BABYLON.Vector3(mx, my + 0.3, mz);
    const mushMat = new BABYLON.PBRMaterial('mushMat' + i, scene);
    const hue = rng(0, 1);
    mushMat.albedoColor = new BABYLON.Color3(0.1 + hue * 0.1, 0.2, 0.1 + (1-hue) * 0.15);
    mushMat.metallic = 0.1;
    mushMat.roughness = 0.4;
    mushMat.emissiveColor = new BABYLON.Color3(0.05 + hue * 0.1, 0.15, 0.05 + (1-hue) * 0.1);
    mush.material = mushMat;
  }

  // ───────────────────────── Ground fog planes ─────────────────────────
  for (let i = 0; i < 6; i++) {
    const fogPlane = BABYLON.MeshBuilder.CreatePlane('fogPlane' + i, { size: rng(20, 40) }, scene);
    const fx = rng(-40, 40), fz = rng(-40, 40);
    fogPlane.position = new BABYLON.Vector3(fx, getTerrainHeight(fx, fz) + rng(0.5, 2.5), fz);
    fogPlane.rotation.x = Math.PI / 2;
    fogPlane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_Y;
    const fogMat = new BABYLON.StandardMaterial('fogMat' + i, scene);
    fogMat.diffuseColor = new BABYLON.Color3(0.4, 0.4, 0.5);
    fogMat.emissiveColor = new BABYLON.Color3(0.08, 0.07, 0.1);
    fogMat.alpha = 0.08;
    fogMat.disableLighting = true;
    fogMat.backFaceCulling = false;
    fogPlane.material = fogMat;
    fogPlane.isPickable = false;

    // Animate drift
    const startX = fogPlane.position.x;
    const driftSpeed = rng(0.3, 0.8);
    const driftAmp = rng(3, 8);
    scene.onBeforeRenderObservable.add(() => {
      const t = performance.now() / 1000;
      fogPlane.position.x = startX + Math.sin(t * driftSpeed) * driftAmp;
      fogPlane.material.alpha = 0.05 + 0.04 * Math.sin(t * 0.5 + i);
    });
  }

  // ───────────────────────── Game State ─────────────────────────
  let gameTime = 120;
  let gameOver = false;
  let slowMo = false;
  let slowMoFactor = 1;
  let winner = null;

  function checkWinCondition() {
    if (gameOver) return;

    const redAlive = units.filter(u => u.team === 'red' && u.alive);
    const blueAlive = units.filter(u => u.team === 'blue' && u.alive);

    // Check if red reached the base
    for (const u of redAlive) {
      if (dist2D(u.body.position, BASE_POS) < 6) {
        endGame('red', 'Red army has seized the base!');
        return;
      }
    }

    // All red dead
    if (redAlive.length === 0) {
      endGame('blue', 'Blue defenders eliminated all attackers!');
      return;
    }

    // All blue dead
    if (blueAlive.length === 0) {
      endGame('red', 'Red destroyed all defenders!');
      return;
    }

    // Timeout
    if (gameTime <= 0) {
      endGame('blue', 'Time expired - Defenders hold the base!');
      return;
    }
  }

  function endGame(team, msg) {
    gameOver = true;
    winner = team;
    slowMo = true;

    $('winnerTitle').textContent = team === 'red' ? 'RED VICTORY' : 'BLUE VICTORY';
    $('winnerTitle').style.color = team === 'red' ? '#ff4444' : '#4488ff';
    $('winnerTitle').style.textShadow = team === 'red'
      ? '0 0 40px rgba(255,68,68,0.8), 0 0 80px rgba(255,68,68,0.4)'
      : '0 0 40px rgba(68,136,255,0.8), 0 0 80px rgba(68,136,255,0.4)';
    $('winnerSub').textContent = msg;
    $('winnerOverlay').classList.add('show');

    $('phaseText').textContent = team.toUpperCase() + ' WINS';
    $('statusText').textContent = msg.toUpperCase();
  }

  // ───────────────────────── Main Loop ─────────────────────────
  $('loadingStatus').textContent = 'Ready for battle!';
  setTimeout(() => $('loadingScreen').classList.add('hidden'), 800);

  let lastTime = performance.now();
  scene.onBeforeRenderObservable.add(() => {
    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.05);

    // Slow motion
    if (slowMo) {
      slowMoFactor = lerp(slowMoFactor, 0.15, 0.02);
    }
    dt *= slowMoFactor;

    const time = now / 1000;

    // Timer
    if (!gameOver) {
      gameTime -= dt;
      gameTime = Math.max(0, gameTime);
      const mins = Math.floor(gameTime / 60);
      const secs = Math.floor(gameTime % 60);
      $('timer').textContent = mins + ':' + (secs < 10 ? '0' : '') + secs;

      if (gameTime < 30) {
        $('timer').style.color = '#ff4444';
        $('timer').style.textShadow = '0 0 20px rgba(255,68,68,0.6)';
      }
    }

    // Update units
    for (const u of units) {
      u.update(dt, time, units);
    }

    // Update projectiles
    updateProjectiles(dt);

    // HUD
    const ra = units.filter(u => u.team === 'red' && u.alive).length;
    const ba = units.filter(u => u.team === 'blue' && u.alive).length;
    $('redCount').textContent = ra;
    $('blueCount').textContent = ba;
    $('redKills').textContent = redKills;
    $('blueKills').textContent = blueKills;

    // Status text
    if (!gameOver) {
      if (gameTime > 110) $('statusText').textContent = 'RED FORCES ADVANCING...';
      else if (ra > ba) $('statusText').textContent = 'RED HAS THE ADVANTAGE';
      else if (ba > ra) $('statusText').textContent = 'BLUE HOLDING STRONG';
      else $('statusText').textContent = 'BATTLE RAGES ON';
    }

    // Crystal rotation
    crystal.rotation.y += dt * 0.3;
    crystal.rotation.x = Math.sin(time * 0.5) * 0.1;

    // Camera auto orbit
    if (autoOrbit) {
      camera.alpha += orbitSpeed;
    }

    // Camera focus on action: find center of alive units
    const aliveUnits = units.filter(u => u.alive);
    if (aliveUnits.length > 0) {
      let cx = 0, cz = 0;
      for (const u of aliveUnits) {
        cx += u.body.position.x;
        cz += u.body.position.z;
      }
      cx /= aliveUnits.length;
      cz /= aliveUnits.length;
      camera.target.x = lerp(camera.target.x, cx * 0.3, 0.01);
      camera.target.z = lerp(camera.target.z, cz * 0.3, 0.01);
    }

    // Win check
    checkWinCondition();
  });

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());

  // ───────────────────────── Debug ─────────────────────────
  console.log('Battlefield initialized. Units:', units.length, 'Havok:', !!havokInstance);
})();
</script>

</html>
